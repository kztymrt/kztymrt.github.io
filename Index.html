<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>喘息コントロールテスト（ACT）</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f5f5f7;color:#1a1a1a;min-height:100vh;}
  .header{background:#534AB7;color:#fff;padding:16px 20px;position:sticky;top:0;z-index:10;}
  .header h1{font-size:17px;font-weight:600;margin-bottom:2px;}
  .header p{font-size:12px;opacity:0.85;}
  .prog-wrap{background:rgba(255,255,255,0.3);height:4px;border-radius:99px;margin-top:10px;}
  .prog-fill{height:100%;background:#fff;border-radius:99px;transition:width 0.3s;width:0%;}
  .container{padding:16px;}
  .q-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
  .q-tag{display:inline-block;background:#EEEDFe;color:#534AB7;font-size:11px;font-weight:600;border-radius:6px;padding:3px 9px;margin-bottom:8px;}
  .q-text{font-size:14px;line-height:1.65;color:#1a1a1a;margin-bottom:12px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt-label{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid #e5e5ea;border-radius:10px;cursor:pointer;transition:all 0.15s;font-size:13px;color:#1a1a1a;}
  .opt-label.selected{background:#EEEDFe;border-color:#534AB7;color:#534AB7;font-weight:500;}
  .opt-label input{display:none;}
  .opt-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid #c7c7cc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .opt-label.selected .opt-circle{background:#534AB7;border-color:#534AB7;}
  .opt-circle::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;opacity:0;}
  .opt-label.selected .opt-circle::after{opacity:1;}
  .submit-wrap{padding:8px 16px 32px;}
  .btn-submit{width:100%;background:#534AB7;color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.3px;}
  .btn-submit:active{opacity:0.85;}
  .btn-submit:disabled{background:#c7c7cc;cursor:not-allowed;}

  /* 結果画面 */
  #page-result{display:none;}
  .result-header{background:#534AB7;color:#fff;padding:20px;text-align:center;}
  .result-header h2{font-size:18px;font-weight:600;margin-bottom:4px;}
  .result-header p{font-size:13px;opacity:0.85;}
  .score-area{background:#fff;margin:16px;border-radius:14px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
  .score-big{font-size:56px;font-weight:700;color:#534AB7;line-height:1;}
  .score-max{font-size:16px;color:#8e8e93;margin-top:4px;}
  .score-badge{display:inline-block;margin-top:12px;font-size:13px;font-weight:600;border-radius:8px;padding:6px 16px;}
  .bc-area{background:#fff;margin:0 16px 16px;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
  .bc-area h3{font-size:14px;font-weight:600;margin-bottom:4px;color:#1a1a1a;}
  .bc-area p{font-size:12px;color:#8e8e93;margin-bottom:14px;}
  #bc-canvas{display:block;width:100%;height:auto;border-radius:8px;border:1px solid #e5e5ea;}
  .data-str{font-size:11px;font-family:monospace;background:#f5f5f7;border-radius:8px;padding:10px;word-break:break-all;color:#636366;margin-top:12px;}
  .btn-reset{display:block;width:calc(100% - 32px);margin:0 16px 32px;background:#f5f5f7;color:#534AB7;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;}
  .answer-summary{margin:0 16px 16px;background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
  .answer-summary h3{font-size:14px;font-weight:600;margin-bottom:10px;}
  .ans-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid #f2f2f7;}
  .ans-row:last-child{border-bottom:none;}
  .ans-key{color:#636366;}
  .ans-val{font-weight:500;color:#534AB7;}
</style>
</head>
<body>

<!-- アンケート画面 -->
<div id="page-survey">
  <div class="header">
    <h1>喘息コントロールテスト（ACT）</h1>
    <p>この４週間の状態についてお答えください</p>
    <div class="prog-wrap"><div class="prog-fill" id="progress"></div></div>
  </div>
  <div class="container" id="questions-container"></div>
  <div class="submit-wrap">
    <button class="btn-submit" id="btn-submit" onclick="submitSurvey()" disabled>回答を確定する</button>
  </div>
</div>

<!-- 結果画面 -->
<div id="page-result">
  <div class="result-header">
    <h2>回答結果</h2>
    <p>バーコードリーダーでスキャンしてください</p>
  </div>
  <div class="score-area">
    <div class="score-big" id="score-num">--</div>
    <div class="score-max">/ 25点</div>
    <div class="score-badge" id="score-badge"></div>
  </div>
  <div class="answer-summary">
    <h3>回答内容</h3>
    <div id="answer-rows"></div>
  </div>
  <div class="bc-area">
    <h3>一次元バーコード（Code 128）</h3>
    <p>バーコードリーダーをこの画面にかざしてください</p>
    <canvas id="bc-canvas" height="110"></canvas>
    <div class="data-str" id="data-str"></div>
  </div>
  <button class="btn-reset" onclick="resetSurvey()">もう一度回答する</button>
</div>

<script>
const QS = [
  {
    key:'A',
    text:'この４週間に、喘息のせいで職場や家庭で思うように仕事がはかどらなかったことは、時間的にどの程度ありましたか？',
    opts:[[1,'いつも'],[2,'かなり'],[3,'いくぶん'],[4,'少し'],[5,'全くない']]
  },
  {
    key:'B',
    text:'この４週間に、どのくらい息切れがしましたか？',
    opts:[[1,'１日に２回以上'],[2,'１日に１回'],[3,'１週間に３〜６回'],[4,'１週間に１，２回'],[5,'全くない']]
  },
  {
    key:'C',
    text:'この４週間に、喘息の症状のせいで夜中に目が覚めたり、いつもより早く目が覚めてしまうことがどのくらいありましたか？',
    opts:[[1,'１日に４回以上'],[2,'１日に２，３回'],[3,'１週間に１回'],[4,'１，２回'],[5,'全くない']]
  },
  {
    key:'D',
    text:'この４週間に、発作止めの吸入薬（サルブタモールなど）をどのくらい使いましたか？',
    opts:[[1,'１日に３回以上'],[2,'１日に１，２回'],[3,'１週間に数回'],[4,'１週間に１回以下'],[5,'全くない']]
  },
  {
    key:'E',
    text:'この４週間に、自分自身の喘息をどの程度コントロールできたと思いますか？',
    opts:[[1,'全くできなかった'],[2,'あまりできなかった'],[3,'まあまあできた'],[4,'十分できた'],[5,'完全にできた']]
  }
];

// 設問描画
const container = document.getElementById('questions-container');
QS.forEach(q => {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML = `<div class="q-tag">設問 ${q.key}</div><p class="q-text">${q.text}</p><div class="options" id="opts-${q.key}"></div>`;
  container.appendChild(card);
  const optsEl = card.querySelector('.options');
  q.opts.forEach(([val, label]) => {
    const lbl = document.createElement('label');
    lbl.className = 'opt-label';
    lbl.innerHTML = `<input type="radio" name="${q.key}" value="${val}"><div class="opt-circle"></div><span>${val}．${label}</span>`;
    lbl.querySelector('input').addEventListener('change', () => {
      document.querySelectorAll(`#opts-${q.key} .opt-label`).forEach(l=>l.classList.remove('selected'));
      lbl.classList.add('selected');
      updateProgress();
    });
    optsEl.appendChild(lbl);
  });
});

function updateProgress(){
  const answered = QS.filter(q=>document.querySelector(`input[name="${q.key}"]:checked`)).length;
  document.getElementById('progress').style.width=(answered/QS.length*100)+'%';
  document.getElementById('btn-submit').disabled = answered < QS.length;
}

// Code 128B
const C128P=[
  '11011001100','11001101100','11001100110','10010011000','10010001100',
  '10001001100','10011001000','10011000100','10001100100','11001001000',
  '11001000100','11000100100','10110011100','10011011100','10011001110',
  '10111001100','10011101100','10011100110','11001110010','11001011100',
  '11001001110','11011100100','11001110100','11101101110','11101001100',
  '11100101100','11100100110','11101100100','11100110100','11100110010',
  '11011011000','11011000110','11000110110','10100011000','10001011000',
  '10001000110','10110001000','10001101000','10001100010','11010001000',
  '11000101000','11000100010','10110111000','10110001110','10001101110',
  '10111011000','10111000110','10001110110','11101110110','11010001110',
  '11000101110','11011101000','11011100010','11011101110','11101011000',
  '11101000110','11100010110','11011010000','11011001010','11011110010',
  '11011110100','11001010000','11110111010','11000010100','10001111010',
  '10100111100','10010111100','10010011110','10111100100','10011110100',
  '10011110010','11110100100','11110010100','11110010010','11011011110',
  '11011110110','11110110110','10101111000','10100011110','10001011110',
  '10111101000','10111100010','11110101000','11110100010','10111011110',
  '10111101110','11101011110','11110101110',
  '11010000100','11010010000','11010011100',
  '1100011101011'
];
function code128Encode(str){
  const START=104; let cs=START; const vals=[START];
  for(let i=0;i<str.length;i++){
    const c=str.charCodeAt(i); if(c<32||c>126) continue;
    const v=c-32; vals.push(v); cs+=(i+1)*v;
  }
  vals.push(cs%103); vals.push(106); return vals;
}
function drawBarcode(canvas, text){
  const vals=code128Encode(text);
  let bars=''; for(const v of vals) bars+=C128P[v];
  const W=canvas.parentElement.clientWidth-40||300;
  const H=110; canvas.height=H;
  const qz=12;
  const bw=Math.max(1,Math.floor((W-qz*2)/bars.length));
  canvas.width=bw*bars.length+qz*2;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,H);
  let x=qz;
  const th=14; const bh=H-th-6;
  for(const b of bars){
    ctx.fillStyle=b==='1'?'#000':'#fff';
    ctx.fillRect(x,4,bw,bh); x+=bw;
  }
  ctx.fillStyle='#000'; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText(text,canvas.width/2,H-3);
}

function submitSurvey(){
  const scores = QS.map(q=>parseInt(document.querySelector(`input[name="${q.key}"]:checked`)?.value||0));
  const total = scores.reduce((a,b)=>a+b,0);
  const ts = new Date().toISOString().slice(2,16).replace(/[-T:]/g,'');
  const data = `ACT,${ts},${scores.join('')},${total}`;

  document.getElementById('score-num').textContent = total;

  const badge = document.getElementById('score-badge');
  if(total>=20){ badge.textContent='コントロール良好'; badge.style.cssText='background:#EAF3DE;color:#3B6D11;'; }
  else if(total>=16){ badge.textContent='一部コントロール不良'; badge.style.cssText='background:#FAEEDA;color:#633806;'; }
  else { badge.textContent='コントロール不良'; badge.style.cssText='background:#FCEBEB;color:#791F1F;'; }

  const rows = document.getElementById('answer-rows');
  rows.innerHTML='';
  QS.forEach((q,i)=>{
    const selOpt = q.opts.find(o=>o[0]===scores[i]);
    const row=document.createElement('div'); row.className='ans-row';
    row.innerHTML=`<span class="ans-key">設問 ${q.key}</span><span class="ans-val">${scores[i]}点　${selOpt?selOpt[1]:''}</span>`;
    rows.appendChild(row);
  });

  document.getElementById('data-str').textContent=data;
  document.getElementById('page-survey').style.display='none';
  document.getElementById('page-result').style.display='block';
  window.scrollTo(0,0);

  setTimeout(()=>{
    const canvas=document.getElementById('bc-canvas');
    drawBarcode(canvas,data);
  },100);
}

function resetSurvey(){
  document.querySelectorAll('input[type=radio]').forEach(r=>r.checked=false);
  document.querySelectorAll('.opt-label').forEach(l=>l.classList.remove('selected'));
  document.getElementById('progress').style.width='0%';
  document.getElementById('btn-submit').disabled=true;
  document.getElementById('page-result').style.display='none';
  document.getElementById('page-survey').style.display='block';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
